version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lentara-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - lentara-network

  web:
    image: nginx:alpine
    container_name: lentara-web
    restart: unless-stopped
    tty: true
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - lentara-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: lentara-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-lentara_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Oktovaaaaa8080}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Oktovaaaaa8080}
      MYSQL_USER: ${DB_USERNAME:-lentara_user}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - lentara-network

networks:
  lentara-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
